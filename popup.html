<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scout</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="app">
        <header>
            <div class="logo-row">
                <span class="logo-text">Scout</span>
                <div style="display:flex;align-items:center;gap:8px">
                    <span class="header-meta" id="meta"></span>
                    <button class="refresh-btn" id="refreshBtn" title="Refresh">&#8635;</button>
                </div>
            </div>
            <div class="greeting" id="greeting"></div>
        </header>

        <!-- Start screen -->
        <div id="startScreen" class="onboard hidden">
            <div class="onboard-icon">📋</div>
            <h2>See what's due</h2>
            <p class="subtitle">Your Blackboard deadlines, grades, and materials — all in one view.</p>
            <div class="trust-badges">
                <div class="badge">
                    <span class="badge-dot"></span>
                    <span>Local only</span>
                </div>
                <div class="badge">
                    <span class="badge-dot"></span>
                    <span>No data sent</span>
                </div>
                <div class="badge">
                    <span class="badge-dot"></span>
                    <span>~1 minute</span>
                </div>
            </div>
            <button class="btn-large" id="startBtn">Connect to Blackboard</button>
            <p class="reassurance">You'll log in with your BU credentials</p>
        </div>

        <!-- Loading screen (replaces debug log) -->
        <div class="loading hidden" id="loadingState">
            <div class="spinner"></div>
            <div class="loading-text">Pulling your data from Blackboard...</div>
            <div class="loading-sub" id="loadingSub">This usually takes about a minute</div>
        </div>

        <!-- Dashboard -->
        <div class="dashboard hidden" id="dashboard">
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="Search tasks..." />
            </div>

            <div class="tabs">
                <button class="tab active" data-view="upcoming">upcoming</button>
                <button class="tab" data-view="log">completed</button>
            </div>

            <div class="views active" id="upcoming"></div>
            <div class="views" id="log"></div>
        </div>
    </div>
    <script src="popup.js"></script>
</body>
</html>
